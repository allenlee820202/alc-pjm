name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, unit + e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTH_MODE: stub
      REPO_MODE: memory
      STUB_AUTH_EMAIL: demo@example.com
      STUB_AUTH_PASSWORD: demo1234
      STUB_AUTH_SECRET: ci-secret-do-not-use-in-prod-thirty-two-chars-min
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Get Playwright version
        id: pw-version
        run: |
          v=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Trigger Vercel deploy
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook (if configured)
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            echo "Triggering Vercel deploy hook..."
            curl -fsSL -X POST "$HOOK_URL"
          else
            echo "No VERCEL_DEPLOY_HOOK_URL secret set."
            echo "Vercel's Git integration will deploy automatically on push"
            echo "when the project is linked to this repo."
          fi
